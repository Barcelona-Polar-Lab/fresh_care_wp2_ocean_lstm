# =============================================================================
# Arctic Reconstruction Pipeline — Pan-Arctic 25 km configuration
# =============================================================================
# Full Arctic, 350 × 350 cells × 25 km, centered at the North Pole.
# Reconstruction at daily resolution from GLORYS daily fields.
#
# Run:
#   bash run_reconstruction.sh configs/config_arctic_25km.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# EASE Grid Definition (Lambert Azimuthal Equal Area, North Pole)
# ---------------------------------------------------------------------------
grid:
  resolution_km: 25
  center_x_m: 0
  center_y_m: 0
  width_km: 7000     # 280 cells × 25 km
  height_km: 7000    # 280 cells × 25 km
  # Optional non-strict lat/lon bounding box (>=, <=). Cells outside are
  # masked: float vars set to NaN, ocean_mask AND-ed to 0.
  # examples: lon_min: -180, lon_max: 180, lat_min: 60, lat_max: 90
  # when non specified, takes the full extent
  lat_min: 60

# ---------------------------------------------------------------------------
# Projection (Lambert Azimuthal Equal Area, North Pole)
# ---------------------------------------------------------------------------
projection:
  lat_0: 90
  lon_0: 0
  false_easting: 0
  false_northing: 0

# ---------------------------------------------------------------------------
# Time Range
# ---------------------------------------------------------------------------
time:
  start_month: "2011-01"
  end_month: "2021-12"

# ---------------------------------------------------------------------------
# Model Training Period (used for out-of-range warnings)
# ---------------------------------------------------------------------------
training_period:
  start_month: "2011-01"
  end_month: "2021-12"

# ---------------------------------------------------------------------------
# Data Paths
# ---------------------------------------------------------------------------
paths:
  glorys_monthly_dir: "/media/nicolas/DATOS/Reanalysis/GLORYS_monthly_2010_2022/data"
  glorys_daily_dir:   "/media/nicolas/DATOS/Reanalysis/GLORYS_daily_arctic_ST_2010_2024"

  sst_raw_dir: "/home/nicolas/SACO/FRESH-CARE/Data_satellite/SST/data"
  sss_raw_dir: "/home/nicolas/SACO/FRESH-CARE/Data_satellite/SSS/sss_cci_v55/non_regridded_filled_wg"
  adt_raw_dir: "/home/nicolas/SACO/FRESH-CARE/Data_satellite/AVISO/non_regridded_north_pole_1px"

  gebco_1km_file:           "/home/nicolas/SACO/FRESH-CARE/Data_bathymetry/GEBCO_Sep_2025/data_EASE/gebco_ease_grid_1km.nc"
  natural_earth_shapefile:  "/home/nicolas/SACO/FRESH-CARE/Arctic_masks/natural_earth_data/ne_10m_ocean/ne_10m_ocean.shp"

  model_path: "/home/nicolas/SACO/FRESH-CARE/Codes/WP2/buongiorno_to_pytorch_padding/AA_winner_model_LSTM_52_46_bs16_lr2e-4_pat6x5_do0.2/model.pth"

  output_dir: "/home/nicolas/SACO/FRESH-CARE/Data_lstm_reconstruction/arctic_25km"

# ---------------------------------------------------------------------------
# Host overrides — keys here override cfg['paths'] when PIPELINE_HOST=<host>.
# Selected via `bash run_reconstruction.sh --host=<host> ...` (default: local).
# Only Phase D currently runs remotely, so only the paths Phase D needs
# (output_dir for intermediates/anomalies, model_path for the LSTM weights)
# need to be defined here. Other paths (raw GLORYS, satellite, GEBCO, NE)
# are unused by Phase D and can stay at their local values.
# ---------------------------------------------------------------------------
host_overrides:
  server:
    output_dir: "/data/FRESH-CARE/data_for_LSTM/reconst_inputs/arctic_25km"
    model_path: "/home/FRESH-CARE/Codes/WP2_lstm/arctic_reconstruction_ease/trained_model/model.pth"

# ---------------------------------------------------------------------------
# Processing Parameters
# ---------------------------------------------------------------------------
processing:
  glorys_mode: "daily"
  reconstruction_interval_days: 3   # ← every 3rd day
  n_mc_samples: 500
  chunk_size: 5000
  time_window_days: 16

# ---------------------------------------------------------------------------
# Depth Levels
# ---------------------------------------------------------------------------
depth_levels: "woa_standard"

# ---------------------------------------------------------------------------
# Metadata (written into NetCDF global attributes)
# ---------------------------------------------------------------------------
metadata:
  title:       "Deep Learning-Based Four-Dimensional Reconstruction of Temperature, Salinity and Geostrophic Currents in the Pan-Arctic Ocean, 2011–2021, with 3-Day Resolution on EASE-Grid 2.0 at 25 km (Version 1)"
  institution: "Institut de Ciències del Mar (ICM-CSIC)"
  authors:     "Nicolas Werner-Pelletier, Aleida Rosquete, Maria Sánchez-Urrea, Julia Crespin, Nina Hoareau, Mario Martin, Marta Umbert"
  contact:     "nicolaswerner@icm.csic.es"
  project:     "FRESH-CARE (ERC Starting Grant)"
  version:     "1.0"
  region:      "Pan-Arctic (≥ ~60°N)"
  comment:     "Pan-Arctic 3-D temperature/salinity reconstruction at 25 km EASE-2 resolution from satellite SST/SSS/ADT and GLORYS12 reanalysis, using an LSTM with Monte-Carlo Dropout; restricted to the Arctic domain (lat >= 60 deg N)."
