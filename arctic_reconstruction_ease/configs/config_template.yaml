# =============================================================================
# Arctic Reconstruction Pipeline — Configuration Template
# =============================================================================
# Copy this file, edit the values, and pass it to the pipeline:
#   bash run_reconstruction.sh my_config.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# EASE Grid Definition
# ---------------------------------------------------------------------------
# The target grid is defined by its resolution, center, and extent.
# resolution_km: cell size in kilometers
#     common values: 1, 3, 3.125, 6.25, 9, 12.5, 25
# center_x_m / center_y_m: grid center in EASE projection meters
#     (0, 0) = North Pole for the default Arctic projection
# width_km / height_km: total grid extent in km (can be rectangular)
# BERING STRAIGHT:
grid:
  resolution_km: 1
  center_x_m: -450000
  center_y_m: 2700000
  width_km: 750       # 750 cells × 1 km
  height_km: 300      # 300 cells × 1 km

# ---------------------------------------------------------------------------
# Projection Parameters (Lambert Azimuthal Equal Area)
# ---------------------------------------------------------------------------
# These should normally not be changed unless you know what you are doing.
projection:
  lat_0: 90
  lon_0: 0
  false_easting: 0
  false_northing: 0

# ---------------------------------------------------------------------------
# Time Range
# ---------------------------------------------------------------------------
# Start and end months (inclusive) in YYYY-MM format.
# Monthly GLORYS → one reconstruction per month (target date: 15th).
# Daily  GLORYS → one reconstruction per day within each month.
time:
  start_month: "2012-01"
  end_month: "2012-12"

# ---------------------------------------------------------------------------
# Model Training Period (for out-of-range warnings)
# ---------------------------------------------------------------------------
# If the requested time range falls outside this period, the pipeline will
# warn the user and ask for confirmation before proceeding. Predictions can
# still be made outside the training period, but they may be less reliable.
training_period:
  start_month: "2011-01"
  end_month: "2021-12"

# ---------------------------------------------------------------------------
# Data Paths
# ---------------------------------------------------------------------------
paths:
  # GLORYS reanalysis directories (at least one must be available)
  glorys_monthly_dir: "/media/nicolas/DATOS/Reanalysis/GLORYS_monthly_2010_2022/data"
  glorys_daily_dir: "/media/nicolas/DATOS/Reanalysis/GLORYS_daily_arctic_ST_2010_2024"

  # Raw satellite data directories (lat/lon grid, before EASE regridding)
  sst_raw_dir: "/home/nicolas/SACO/FRESH-CARE/Data_satellite/SST/data"
  sss_raw_dir: "/home/nicolas/SACO/FRESH-CARE/Data_satellite/SSS/sss_cci_v55/non_regridded_filled_wg"
  adt_raw_dir: "/home/nicolas/SACO/FRESH-CARE/Data_satellite/AVISO/non_regridded_north_pole_1px"

  # Static reference files
  gebco_1km_file: "/home/nicolas/SACO/FRESH-CARE/Data_bathymetry/GEBCO_Sep_2025/data_EASE/gebco_ease_grid_1km.nc"
  natural_earth_shapefile: "/home/nicolas/SACO/FRESH-CARE/Arctic_masks/natural_earth_data/ne_10m_ocean/ne_10m_ocean.shp"

  # Trained LSTM model
  model_path: "trained_models/wg_daily/model_LSTM_52_46_sat/model.pth"

  # Output directory for reconstruction results
  output_dir: "/home/nicolas/SACO/FRESH-CARE/Data_lstm_reconstruction/bering_test"

# ---------------------------------------------------------------------------
# Processing Parameters
# ---------------------------------------------------------------------------
processing:
  # GLORYS mode: "monthly", "daily", or "auto"
  #   auto: prefer daily if available for the requested period, else monthly
  glorys_mode: "monthly"

  # Monte Carlo Dropout parameters
  n_mc_samples: 50
  chunk_size: 5000

  # Satellite time-interpolation window (days before and after target date)
  time_window_days: 16

# ---------------------------------------------------------------------------
# Depth Levels
# ---------------------------------------------------------------------------
# "woa_standard" uses the 102-level WOA standard depth grid (0–5500 m).
depth_levels: "woa_standard"
